  #qty3 { left:55.0%; top:50.75%; width:7.4%; }
  #unit3 { left:66.8%; top:50.75%; width:11.1%; }
  #total3 { left:82.5%; top:50.75%; width:11.3%; }

  /* Totals */
  #subtotal { left:82.0%; top:56.75%; width:11.5%; }
  #discount { left:84.0%; top:60.55%; width:9.5%; height:1.20%; }
  #grandTotal { left:82.0%; top:64.25%; width:11.5%; }
  #paymentMethod { left:60.6%; top:69.55%; width:17.5%; }

  @media print {
    @page { size:A4 portrait; margin:0; }
    html,body { width:210mm; height:297mm; background:#fff; }
    .toolbar { display:none !important; }
    .viewport { padding:0; overflow:visible; }
    .sheet {
      width:205.1mm; height:297mm; margin:0 auto; box-shadow:none;
      print-color-adjust:exact; -webkit-print-color-adjust:exact;
    }
    .field {
      border:none !important; background:transparent !important;
      font-size:9pt; height:1.55%; padding:0;
    }
  }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">Als PDF speichern / drucken</button>
  <button class="secondary" onclick="saveData()">Daten speichern</button>
  <button class="secondary" onclick="clearData()">Neue Rechnung</button>
  <p class="hint">Die Rechnungsnummer wird automatisch vergeben. Alle übrigen Felder antippen, ausfüllen und anschließend „Als PDF speichern / drucken“ wählen. Im Android-Druckdialog „Als PDF speichern“ auswählen.</p>
</div>

<div class="viewport">
<div class="sheet" id="sheet">
  <input class="field" id="invoiceNumber"      style="text-align:right;direction:ltr;font-size:9px;font-weight:normal;padding:0 4px 0 1px;line-height:1;" aria-label="Rechnungsnummer" readonly>
  <input class="field" id="invoiceDate"      style="text-align:right;direction:ltr;font-size:9px;font-weight:normal;padding:0 4px 0 1px;line-height:1;" type="text" inputmode="numeric" maxlength="10" placeholder="TT.MM.JJJJ" aria-label="Rechnungsdatum">
  <input class="field" id="serviceDate"      style="text-align:right;direction:ltr;font-size:9px;font-weight:normal;padding:0 4px 0 1px;line-height:1;" type="text" inputmode="numeric" maxlength="10" placeholder="TT.MM.JJJJ" aria-label="Leistungsdatum">
  <input class="field" id="dueDate"      style="text-align:right;direction:ltr;font-size:9px;font-weight:normal;padding:0 4px 0 1px;line-height:1;" type="text" inputmode="numeric" maxlength="10" placeholder="TT.MM.JJJJ" aria-label="Fälligkeitsdatum">

  <input class="field money qty" id="qty1" type="number" min="0" step="1" inputmode="decimal">
  <input class="field money unit" id="unit1" type="number" min="0" step="0.01" inputmode="decimal">
  <input class="field money total" id="total1" type="text" readonly>

  <input class="field money qty" id="qty2" type="number" min="0" step="1" inputmode="decimal">
  <input class="field money unit" id="unit2" type="number" min="0" step="0.01" inputmode="decimal">
  <input class="field money total" id="total2" type="text" readonly>

  <input class="field money qty" id="qty3" type="number" min="0" step="1" inputmode="decimal">
  <input class="field money unit" id="unit3" type="number" min="0" step="0.01" inputmode="decimal">
  <input class="field money total" id="total3" type="text" readonly>

  <input class="field money" id="subtotal" type="text" readonly>
  <input class="field money" id="discount" type="number" min="0" max="100" min="0" step="0.01" value="0" inputmode="decimal"><div id="discountPercent" style="position:absolute;left:93.8%;top:60.45%;font-size:10px;font-weight:bold;">%</div>
  <input class="field money" id="grandTotal" type="text" readonly>
</div>
</div>

<script>
const ids = [
  "invoiceNumber","invoiceDate","serviceDate","dueDate",
  "qty1","unit1","qty2","unit2","qty3","unit3",
  "discount"
];

function euro(n) {
  return Number.isFinite(n) ? n.toFixed(2).replace(".", ",") + " €" : "";
}
function num(id) {
  const v = parseFloat(document.getElementById(id).value.replace(",", "."));
  return Number.isFinite(v) ? v : 0;
}
function calculate() {
  let sub = 0;
  for (let i=1;i<=3;i++) {
    const total = num("qty"+i) * num("unit"+i);
    document.getElementById("total"+i).value = total ? euro(total) : "";
    sub += total;
  }
  document.getElementById("subtotal").value = euro(sub);
  const disc = sub * (num("discount")/100); const grand = Math.max(0, sub - disc);
  document.getElementById("grandTotal").value = euro(grand);
}
document.querySelectorAll(".qty,.unit,#discount").forEach(el => el.addEventListener("input", calculate));


function invoiceYear() {
  return new Date().getFullYear();
}

function formatInvoiceNumber(year, sequence) {
  return year + "-" + String(sequence).padStart(4, "0");
}

function assignInvoiceNumber(increment) {
  const year = invoiceYear();
  const counterKey = "jbbInvoiceCounter_" + year;
  let sequence = parseInt(localStorage.getItem(counterKey) || "0", 10);

  if (increment || sequence < 1) {
    sequence += 1;
    localStorage.setItem(counterKey, String(sequence));
  }

  document.getElementById("invoiceNumber").value =
    formatInvoiceNumber(year, sequence);
}

function saveData() {
  const data = {};
  ids.forEach(id => {
    const el = document.getElementById(id);
    data[id] = el.value;
  });
  localStorage.setItem("jbbInvoice", JSON.stringify(data));
  alert("Die Eingaben wurden auf diesem Gerät gespeichert.");
}
function loadData() {
  const raw = localStorage.getItem("jbbInvoice");
  if (!raw) {
    assignInvoiceNumber(false);
    calculate();
    return;
  }
  try {
    const data = JSON.parse(raw);
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (!(id in data)) return;
      el.value = data[id];
    });
  } catch(e) {}
  calculate();
}
function clearData() {
  if (!confirm("Alle Eingaben für eine neue Rechnung löschen?")) return;
  ids.forEach(id => {
    const el = document.getElementById(id);
    el.value = "";
  });
  document.getElementById("discount").value = "0";
  localStorage.removeItem("jbbInvoice");
  assignInvoiceNumber(true);
  calculate();
}
loadData();
calculate();
</script>
</body>
</html>
